<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Text Field</title>
    <meta name="description" content="Paste any text to strip formatting instantly. Clean, pure plain text.">
    <meta name="keywords" content="text, field, html, notepad, formatting, clear text, clear formatting">
    <meta name="author" content="puretextfield.com">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f3;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e5e5e5;
            background: #fff;
        }

        .logo {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1a1a1a;
        }

        .logo span {
            color: #888;
            font-weight: 400;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            background: #fff;
            color: #444;
            cursor: pointer;
            transition: all 0.15s ease;
            letter-spacing: 0.01em;
        }

        .btn:hover {
            background: #f0f0ee;
            border-color: #ccc;
            color: #1a1a1a;
        }

        .btn.primary {
            background: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }

        .btn.primary:hover {
            background: #333;
            border-color: #333;
        }

        .btn-sep {
            width: 1px;
            height: 20px;
            background: #e0e0e0;
            margin: 0 2px;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px 32px;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
        }

        .hint {
            font-size: 0.78rem;
            color: #aaa;
            margin-bottom: 12px;
            letter-spacing: 0.01em;
        }

        textarea {
            flex: 1;
            width: 100%;
            min-height: calc(100vh - 180px);
            padding: 20px;
            font-size: 1rem;
            font-family: inherit;
            line-height: 1.6;
            color: #1a1a1a;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 10px;
            resize: none;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        textarea:focus {
            border-color: #bbb;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.04);
        }

        textarea::placeholder {
            color: #ccc;
        }

        footer {
            text-align: center;
            padding: 16px;
            font-size: 0.72rem;
            color: #ccc;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">pure<span>textfield</span></div>
    <div class="toolbar">
        <button class="btn" onclick="copyAll()">Copy</button>
        <button class="btn primary" onclick="clearField()">Clear</button>
        <div class="btn-sep"></div>
        <button class="btn" onclick="setDir('ltr')">LTR</button>
        <button class="btn" onclick="setDir('rtl')">RTL</button>
        <div class="btn-sep"></div>
        <button class="btn" onclick="decode()">Decode URL</button>
        <button class="btn" onclick="encode()">Encode URL</button>
    </div>
</header>

<main>
    <div class="hint">Paste anything — formatting is stripped automatically.</div>
    <textarea id="text" placeholder="Paste your text here…" spellcheck="false"></textarea>
</main>

<footer>puretextfield.com &mdash; clean text, happy life</footer>

<script>
    function clearField() {
        document.getElementById('text').value = '';
        document.getElementById('text').focus();
    }

    function copyAll() {
        const t = document.getElementById('text');
        if (!t.value) return;
        navigator.clipboard.writeText(t.value).catch(() => {
            t.select();
            document.execCommand('copy');
        });
    }

    function setDir(dir) {
        document.getElementById('text').style.direction = dir;
    }

    function decode() {
        const t = document.getElementById('text');
        try { t.value = decodeURIComponent(t.value.replace(/\+/g, ' ')); } catch(e) {}
    }

    function encode() {
        const t = document.getElementById('text');
        t.value = encodeURIComponent(t.value).replace(/'/g, "%27").replace(/"/g, "%22");
    }

    // Auto-focus on load
    window.onload = () => document.getElementById('text').focus();
</script>

</body>
</html>
