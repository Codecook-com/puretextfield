<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Text Field</title>
    <meta name="description" content="Paste any text to strip formatting instantly. Clean, pure plain text.">
    <meta name="keywords" content="text, field, html, notepad, formatting, clear text, clear formatting">
    <meta name="author" content="puretextfield.com">
    <link rel="icon" href="favicon.ico">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f3;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e5e5e5;
            background: #fff;
        }

        .logo {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1a1a1a;
        }

        .logo span {
            color: #888;
            font-weight: 400;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            background: #fff;
            color: #444;
            cursor: pointer;
            transition: all 0.15s ease;
            letter-spacing: 0.01em;
        }

        .btn:hover {
            background: #f0f0ee;
            border-color: #ccc;
            color: #1a1a1a;
        }

        .btn.primary {
            background: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }

        .btn.primary:hover {
            background: #333;
            border-color: #333;
        }

        .btn-sep {
            width: 1px;
            height: 20px;
            background: #e0e0e0;
            margin: 0 2px;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px 32px;
            max-width: 1100px;
            width: 100%;
            margin: 0 auto;
        }

        .hint {
            font-size: 0.78rem;
            color: #aaa;
            margin-bottom: 12px;
            letter-spacing: 0.01em;
        }

        textarea {
            flex: 1;
            width: 100%;
            min-height: calc(100vh - 180px);
            padding: 20px;
            font-size: 1rem;
            font-family: inherit;
            line-height: 1.6;
            color: #1a1a1a;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 10px;
            resize: none;
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        textarea:focus {
            border-color: #bbb;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.04);
        }

        textarea::placeholder {
            color: #ccc;
        }

        .save-status {
            position: absolute;
            top: 8px;
            right: 12px;
            font-size: 0.72rem;
            color: #bbb;
            pointer-events: none;
            transition: color 0.3s ease;
        }

        .save-status.saving {
            color: #f59e0b;
        }

        .save-status.saved {
            color: #86efac;
        }

        .textarea-wrap {
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .textarea-wrap textarea {
            flex: 1;
        }

        footer {
            text-align: center;
            padding: 16px;
            font-size: 0.72rem;
            color: #ccc;
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>

<header>
    <div class="logo"><img src="favicon.ico" style="width:18px;height:18px;vertical-align:middle;margin-right:8px;">pure<span>textfield</span></div>
    <div class="toolbar">
        <button class="btn" onclick="copyAll()">Copy</button>
        <button class="btn" onclick="clearField()">Clear</button>
        <div class="btn-sep"></div>
        <button class="btn primary" id="btn-ltr" onclick="setDir('ltr')">LTR</button>
        <button class="btn" id="btn-rtl" onclick="setDir('rtl')">RTL</button>
        <div class="btn-sep"></div>
        <button class="btn" onclick="decode()">Decode URL</button>
        <button class="btn" onclick="encode()">Encode URL</button>
    </div>
</header>

<main>
    <div class="hint">Paste anything — formatting is stripped automatically.</div>
    <div class="textarea-wrap">
        <span class="save-status" id="save-status"></span>
        <textarea id="text" placeholder="Paste your text here…" spellcheck="false"></textarea>
    </div>
</main>

<footer>puretextfield.com &mdash; clean text, happy life</footer>

<script>
    function copyAll() {
        const t = document.getElementById('text');
        if (!t.value) return;
        navigator.clipboard.writeText(t.value).catch(() => {
            t.select();
            document.execCommand('copy');
        });
    }

    function setDir(dir) {
        document.getElementById('text').style.direction = dir;
        document.getElementById('btn-ltr').classList.toggle('primary', dir === 'ltr');
        document.getElementById('btn-rtl').classList.toggle('primary', dir === 'rtl');
    }

    function decode() {
        const t = document.getElementById('text');
        try { t.value = decodeURIComponent(t.value.replace(/\+/g, ' ')); } catch(e) {}
    }

    function encode() {
        const t = document.getElementById('text');
        t.value = encodeURIComponent(t.value).replace(/'/g, "%27").replace(/"/g, "%22");
    }

    // Persist content across refreshes — each tab is independent
    const TAB_ID = sessionStorage.getItem('ptf-tab-id') || (() => {
        const id = Math.random().toString(36).slice(2);
        sessionStorage.setItem('ptf-tab-id', id);
        return id;
    })();
    const STORAGE_KEY = 'ptf-content-' + TAB_ID;
    let saveTimer = null;
    let countTimer = null;
    let countdown = 0;

    function setStatus(text, cls) {
        const el = document.getElementById('save-status');
        el.textContent = text;
        el.className = 'save-status' + (cls ? ' ' + cls : '');
    }

    function scheduleSave() {
        clearTimeout(saveTimer);
        clearInterval(countTimer);
        countdown = 10;
        setStatus('Auto save in ' + countdown + ' sec.', 'saving');
        countTimer = setInterval(() => {
            countdown--;
            if (countdown > 0) {
                setStatus('Auto save in ' + countdown + ' sec.', 'saving');
            } else {
                clearInterval(countTimer);
            }
        }, 1000);
        saveTimer = setTimeout(() => {
            localStorage.setItem(STORAGE_KEY, document.getElementById('text').value);
            setStatus('Content saved', 'saved');
        }, 10000);
    }

    function clearField() {
        const t = document.getElementById('text');
        t.value = '';
        t.focus();
        clearTimeout(saveTimer);
        clearInterval(countTimer);
        localStorage.removeItem(STORAGE_KEY);
        setStatus('', '');
    }

    window.onload = () => {
        const t = document.getElementById('text');
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) { t.value = saved; setStatus('Content saved', 'saved'); }
        t.focus();
        t.addEventListener('input', scheduleSave);
    };
</script>

</body>
</html>
