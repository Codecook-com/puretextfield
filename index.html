<html>
    <head>
        <title>Text Purifier</title>
        <meta name="description" content="Clear text formatting by simply pasting it into the textfield. "/>
        <meta name="description" content="Text Purifier | Clear text formatting by simply pasting it into the textfield. "/>
        <meta name="keywords" content="text, field, html, notepad, formatting, clear text, clear formatting">
        <meta name="author" content="http://xyzet.me">
        
        <script>
            
            console.log('Text Purifier | Clear formatting and be happy :)');
            
            
            function clear(){
                var obj = document.getElementById('text');
                obj.value = "";
            }
            
            function encode() {
                var obj = document.getElementById('text');
                var unencoded = obj.value;
                obj.value = encodeURIComponent(unencoded).replace(/'/g,"%27").replace(/"/g,"%22");	
            }
            
            function decode() {
                var obj = document.getElementById('text');
                var encoded = obj.value;
                obj.value = decodeURIComponent(encoded.replace(/\+/g,  " "));
            }    
            
            function rtl() {
                var obj = document.getElementById('text');
                obj.style.direction="rtl";
            }   
            
            function ltr() {
                var obj = document.getElementById('text');
                obj.style.direction="ltr";
            }

            
        </script>
        
        <style>
            
            .container{
                position: relative;
                top:10px;
                width: 100%;
            }
            
            .behappy {
                margin-top: 10px;
                font-size: 0.8em;
                width: 100%;
                text-align: center;
                font-family: Open sans;
                color: #333;
            }
            .pure{
                width:80%; 
                min-height:700px;
                margin-left: 10%;
                margin-right: 10%;
                font-size: 1.2em;
            }
        </style>
        
    </head>
<body>
    
    <div class="behappy">
        <a href="javascript:clear();">Clear</a> | <a href="javascript:decode();">Decode</a> | <a href="javascript:rtl();">RTL</a> | <a href="javascript:ltr();">LTR</a>
    </div>
    
    <div class="container">
        <textarea id="text" class="pure"></textarea>
        <div class="behappy">
            Text Purifier | Clear formatting and be happy :)
        </div>
    </div>
